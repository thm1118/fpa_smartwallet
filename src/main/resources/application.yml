spring:
  application:
    name: smartwallet

  datasource:
    url: jdbc:h2:mem:smartwallet
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: smartwallet-secret-key-for-jwt-token-generation-2024
  expiration: 86400000

service:
  internal-key: fintech-internal-service-key-2024
  quickpay:
    url: http://localhost:8081
  tradesim:
    url: http://localhost:8082
  middleplatform:
    url: http://localhost:8087

logging:
  level:
    com.fintech.smartwallet: DEBUG
    org.springframework.security: DEBUG
